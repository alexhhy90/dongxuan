<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命运解读</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg: #000000;
            --gold: #C9A050;
            --cyan: #5EEADB;
            --star-blue: #4A90D9;
            --purple: #8B7CF0;
            --jade: #3DDC97;
            --card-bg: rgba(8, 10, 22, 0.78);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #e8e8e8;
            --text-secondary: #bbb;
            --text-muted: #999;
            --water: #5EEADB;
            --wood: #6BCB77;
            --fire: #E85D5D;
            --earth: #C9A050;
            --metal: #F0D060;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 16px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            position: relative;
            z-index: 2;
        }
        /* 首页 */
.home-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
}
.home-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 180vw;
    height: 180vh;
    object-fit: cover;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    z-index: 0;
    pointer-events: none;
    animation: logoSpin 800s linear infinite, logoBreathe 8s ease-in-out infinite;
}

@keyframes logoSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(-360deg); }
}
@keyframes logoBreathe {
    0%, 100% {
        opacity: 0.3;
        filter: drop-shadow(0 0 8px rgba(201, 160, 80, 0.2));
    }
    50% {
        opacity: 1;
        filter: drop-shadow(0 0 20px rgba(201, 160, 80, 0.5));
    }
}
        .header-title {
            text-align: center;
            margin-bottom: 44px;
            margin-top: -80px;
        }
        .header-title h1 {
            font-size: 26px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.6em;
            text-indent: 0.6em;
            margin-bottom: 10px;
        }
        .header-title .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.4em;
            text-indent: 0.4em;
        }
        .portal-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: nowrap;
            width: 100%;
        }
  .portal-card {
    background: #000000;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 30px rgba(201, 160, 80, 0.06), inset 0 0 30px rgba(255, 255, 255, 0.01);
    border-radius: 16px;
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.35s ease;
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
    flex: 1;
    min-width: 200px;
    max-width: 280px;
}
        .portal-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.04);
        }
        .portal-icon-img {
            width: 270px;
            height: 480px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            flex-shrink: 0;
        }
        .icon-qimen {
            background: rgba(74, 144, 217, 0.12);
            color: var(--star-blue);
        }
        .icon-bazi {
            background: rgba(201, 160, 80, 0.12);
            color: var(--gold);
        }
        .icon-xiaoliuren {
            background: rgba(61, 220, 151, 0.12);
            color: var(--jade);
        }
        .portal-card .name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.06em;
        }
        .portal-card .desc {
            font-size: 11px;
            color: var(--text-secondary);
        }
        @media (max-width: 700px) {
            .portal-grid {
                flex-direction: column;
                align-items: center;
            }
            .portal-card {
                max-width: 400px;
                width: 100%;
            }
        }
        /* 工具页 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .api-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .api-btn.has-key {
            color: var(--wood);
            border-color: rgba(107, 203, 119, 0.4);
            background: rgba(107, 203, 119, 0.08);
        }
        .tab-nav {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.25s;
        }
        .tab-btn.active {
            background: rgba(201, 160, 80, 0.2);
            border-color: var(--gold);
            color: var(--gold);
            font-weight: 600;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .info-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 16px;
            font-size: 13px;
            backdrop-filter: blur(20px);
            justify-content: center;
            text-align: center;
        }
        .info-item {
            display: flex;
            gap: 4px;
        }
        .info-label {
            color: var(--text-muted);
        }
        .info-value {
            color: var(--gold);
            font-weight: 600;
        }
        .input-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
            backdrop-filter: blur(20px);
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 8px;
        }
        .input-row:last-child {
            margin-bottom: 0;
        }
        .input-row input,
        .input-row select {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
        }
        .input-row input[type="datetime-local"] {
            width: 220px;
            color-scheme: dark;
        }
        .input-row select {
            min-width: 80px;
            max-width: 140px;
            color: var(--text);
        }
        .input-row select option {
            background: #1a1a2e;
            color: var(--text);
        }
        .btn {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 0.04em;
            transition: all 0.2s;
        }
        .btn:hover {
            opacity: 0.85;
        }
        .btn-sm {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            font-size: 11px;
        }
        .grid-outer {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            max-width: 540px;
            margin: 0 auto 14px;
        }
        .cell-outer {
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 10px;
            padding: 6px;
            position: relative;
            backdrop-filter: blur(20px);
        }
        .cell-outer.empty-cell {
            opacity: 0.3;
        }
        .gong-label {
            position: absolute;
            top: 4px;
            left: 7px;
            font-size: 11px;
            color: var(--text-muted);
            z-index: 2;
        }
        .markers {
            position: absolute;
            top: 4px;
            right: 7px;
            display: flex;
            gap: 3px;
            z-index: 2;
        }
        .marker-kong {
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 500;
        }
        .marker-yima {
            color: var(--fire);
            background: rgba(232, 93, 93, 0.1);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 500;
        }
        .grid-inner {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 1px;
            width: 100%;
            aspect-ratio: 1;
        }
        .cell-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 2px;
            font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
            font-size: 23px;
            padding: 1px;
        }
        .cell-inner.pos2 {
            font-weight: 600;
            font-size: 20px;
        }
        .cell-inner.pos5 {
            font-weight: 600;
            font-size: 21px;
        }
        .cell-inner.pos6 {
            font-weight: 700;
            font-size: 25px;
        }
        .cell-inner.pos8 {
            font-weight: 600;
            font-size: 20px;
        }
        .cell-inner.pos9 {
            font-size: 25px;
            font-weight: 700;
            color: var(--text-secondary);
        }
        .c-water {
            color: var(--water) !important;
        }
        .c-wood {
            color: var(--wood) !important;
        }
        .c-fire {
            color: var(--fire) !important;
        }
        .c-earth {
            color: var(--earth) !important;
        }
        .c-metal {
            color: var(--metal) !important;
        }
        .c-silver {
            color: #bbb !important;
        }
        .bd-water {
            border-color: rgba(94, 234, 219, 0.3) !important;
            background: rgba(94, 234, 219, 0.05) !important;
        }
        .bd-wood {
            border-color: rgba(107, 203, 119, 0.3) !important;
            background: rgba(107, 203, 119, 0.05) !important;
        }
        .bd-fire {
            border-color: rgba(232, 93, 93, 0.3) !important;
            background: rgba(232, 93, 93, 0.05) !important;
        }
        .bd-earth {
            border-color: rgba(201, 160, 80, 0.3) !important;
            background: rgba(201, 160, 80, 0.05) !important;
        }
        .bd-metal {
            border-color: rgba(240, 208, 96, 0.3) !important;
            background: rgba(240, 208, 96, 0.05) !important;
        }
        .bd-center {
            border-color: rgba(255, 255, 255, 0.06) !important;
            background: rgba(255, 255, 255, 0.02) !important;
        }
        .card-dim-title {
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }
        .phase-title {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 2px;
        }
        .phase-body {
            font-size: 12px;
            color: #ddd;
            line-height: 1.9;
            text-indent: 1.5em;
            margin-bottom: 0;
            margin-top: 0;
        }
        .phase-now {
            color: var(--cyan);
        }
        .phase-future {
            color: var(--gold);
        }
        .tarot-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            margin-bottom: 24px;
            perspective: 1200px;
            padding: 8px 0;
        }
        .tarot-card {
            width: 300px;
            height: 640px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }
        .tarot-card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .tarot-card.flipped .tarot-card-inner {
            transform: rotateY(180deg);
        }
        .tarot-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            overflow-y: auto;
            padding: 16px 14px;
        }
        .tarot-back {
            background: linear-gradient(180deg, rgba(10, 14, 28, 0.95) 0%, rgba(20, 16, 40, 0.95) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 0.15em;
            writing-mode: vertical-rl;
            text-orientation: upright;
            border-color: rgba(201, 160, 80, 0.4);
        }
        .tarot-front {
            background: linear-gradient(180deg, rgba(8, 10, 22, 0.96) 0%, rgba(16, 14, 30, 0.96) 100%);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            border-color: rgba(255, 255, 255, 0.35);
        }
        .tarot-upper,
        .tarot-lower {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 14px;
            overflow: hidden;
        }
        .tarot-upper {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tarot-loading {
            width: 100%;
            text-align: center;
            color: var(--text-secondary);
            padding: 32px;
            font-size: 14px;
        }
        .tarot-card:hover .tarot-face {
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.06);
        }
        .bazi-table {
            width: 100%;
            max-width: 420px;
            margin: 0 auto 14px;
            border-collapse: collapse;
            text-align: center;
            font-size: 22px;
            font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
        }
        .bazi-table th {
            color: var(--text-muted);
            font-size: 12px;
            padding: 4px;
            font-weight: 400;
        }
        .bazi-table td {
            padding: 12px 8px;
            border: 1px solid var(--card-border);
            font-weight: 600;
            background: var(--card-bg);
            font-size: 24px;
        }
        .liuren-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            max-width: 420px;
            margin: 14px auto;
        }
        .liuren-cell {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            font-size: 18px;
            transition: all 0.5s ease;
            position: relative;
            cursor: default;
        }
        .liuren-cell span {
            color: var(--text);
            font-size: 18px;
        }
        .liuren-cell.highlight {
            border-color: var(--gold);
            background: rgba(201, 160, 80, 0.15);
            transform: scale(1.05);
            z-index: 2;
            box-shadow: 0 0 30px rgba(201, 160, 80, 0.3);
        }
        .liuren-cell.highlight span {
            color: var(--gold);
            font-weight: 700;
            font-size: 22px;
        }
        @media(max-width:700px) {
            .portal-grid {
                flex-direction: column;
                align-items: center;
            }
            .portal-card {
                max-width: 400px;
                width: 100%;
            }
        }
        @media(max-width:600px) {
            .tarot-row {
                justify-content: flex-start;
                padding: 4px 8px;
            }
            .tarot-card {
                width: 200px;
                height: 440px;
                flex-shrink: 0;
            }
        }
    </style>
</head>

 <div class="portal-card" onclick="enterPage('qimen')">
